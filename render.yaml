services:
  - type: web
    name: stock-decision-dashboard
    runtime: python
    region: oregon
    buildCommand: "pip install -r requirements.txt"
    startCommand: python3 server.py
    healthCheckPath: /
    disk:
      name: watchlist-data
      mountPath: /var/data
      sizeGB: 10
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: 10000
      - key: WATCHLIST_FILE
        value: /var/data/watchlist.shared.json
